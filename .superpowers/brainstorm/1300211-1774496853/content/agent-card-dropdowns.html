<h2>Video Extractor — Dropdown Options</h2>
<p class="subtitle">Clean text dropdowns for Quality, Format, and Audio</p>

<div style="display:flex;justify-content:center;padding:20px 0">
  <div style="width:300px;background:#1a1a1a;border-radius:6px;overflow:hidden;font-size:11px;color:#ccc">

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#242424">
      <span style="font-size:15px">🎬</span>
      <span style="color:#e2e8f0;font-weight:600;font-size:12px;flex:1">Video Extractor</span>
      <span style="color:#3b82f6;font-size:10px">▲</span>
    </div>

    <div style="padding:10px 10px 12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid #2a2a2a">

      <!-- Input -->
      <div style="background:#111;border:1px solid #333;border-radius:8px;padding:8px 10px;display:flex;align-items:flex-end;gap:6px;min-height:52px">
        <div style="flex:1;color:#555;font-size:10px;line-height:1.5">Paste a URL or describe the video...</div>
        <div style="background:#3b82f6;border-radius:5px;padding:4px 9px;font-size:9px;color:#fff;white-space:nowrap">Run ▶</div>
      </div>

      <!-- Folder -->
      <div style="display:flex;align-items:center;gap:6px;background:#141414;border:1px solid #2a2a2a;border-radius:6px;padding:5px 9px">
        <span style="color:#666;font-size:10px">📁</span>
        <span style="color:#666;font-size:10px;flex:1">~/Downloads</span>
        <span style="color:#444;font-size:9px;border:1px solid #333;border-radius:3px;padding:1px 5px">Browse</span>
      </div>

      <!-- 3 dropdowns in a row -->
      <div style="display:flex;gap:6px">

        <div style="flex:1;display:flex;flex-direction:column;gap:2px">
          <div style="color:#555;font-size:8px;letter-spacing:0.8px;text-transform:uppercase">Quality</div>
          <div style="background:#111;border:1px solid #2a2a2a;border-radius:5px;padding:4px 8px;display:flex;align-items:center;justify-content:space-between;color:#aaa;font-size:10px">
            Best <span style="color:#555;font-size:8px">▾</span>
          </div>
        </div>

        <div style="flex:1;display:flex;flex-direction:column;gap:2px">
          <div style="color:#555;font-size:8px;letter-spacing:0.8px;text-transform:uppercase">Format</div>
          <div style="background:#111;border:1px solid #2a2a2a;border-radius:5px;padding:4px 8px;display:flex;align-items:center;justify-content:space-between;color:#aaa;font-size:10px">
            MP4 <span style="color:#555;font-size:8px">▾</span>
          </div>
        </div>

        <div style="flex:1;display:flex;flex-direction:column;gap:2px">
          <div style="color:#555;font-size:8px;letter-spacing:0.8px;text-transform:uppercase">Audio</div>
          <div style="background:#111;border:1px solid #2a2a2a;border-radius:5px;padding:4px 8px;display:flex;align-items:center;justify-content:space-between;color:#aaa;font-size:10px">
            Video <span style="color:#555;font-size:8px">▾</span>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
